spring:
  application:
    name: integrations
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/integrations_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  security:
    jwt:
      secret: ${JWT_SECRET:your-secret-key-change-in-production-min-256-bits}
      expiration: 86400000 # 24 hours

# Boomerangme API Configuration
boomerangme:
  api:
    base-url: ${BOOMERANGME_API_URL:https://api.digitalwallet.cards}
    api-key: ${BOOMERANGME_API_KEY:}
    timeout: 30000

# Dutchie POS API Configuration
dutchie:
  api:
    base-url: ${DUTCHIE_API_URL:https://api.pos.dutchie.com}
    api-key: ${DUTCHIE_API_KEY:}
    timeout: 30000
  webhook:
    secret: ${DUTCHIE_WEBHOOK_SECRET:}

# Treez POS API Configuration
treez:
  api:
    base-url: ${TREEZ_API_URL:https://api.treez.io}
    timeout: 30000
    client-id: ${TREEZ_CLIENT_ID:}  # Optional - may use API key if same

# Application Configuration
app:
  admin:
    api-key: ${ADMIN_API_KEY:admin-default-key-change-me}
  retry:
    max-attempts: 3
    initial-interval: 1000
    multiplier: 2.0
    max-interval: 10000
  dutchie:
    polling:
      enabled: ${DUTCHIE_POLLING_ENABLED:true}
      interval: ${DUTCHIE_POLLING_INTERVAL:10000} # Polling interval in milliseconds (default: 10 seconds)

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# OpenAPI/Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
    defaultModelsExpandDepth: 1
    defaultModelExpandDepth: 1
    tryItOutEnabled: true
  show-actuator: false

# Logging Configuration
logging:
  level:
    root: INFO
    heymary.co.integrations: INFO
    heymary.co.integrations.controller: DEBUG  # Enable DEBUG for webhook controllers
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate: ERROR
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
    org.hibernate.type.descriptor.sql: OFF
    org.hibernate.stat: OFF
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/integrations.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB
      file-name-pattern: logs/integrations-%d{yyyy-MM-dd}.%i.log

